version: '3'

# DB/search images keep their internal users (cannot run as arbitrary host uid).
#   HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose -f tests/docker-compose.yml up -d
x-host-user: &host-user
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

services:
  db:
    image: postgres:17
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: password

  redis:
    image: redis:7
    ports:
      - 6379:6379

  quadrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    ports:
      - 9200:9200
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms4g -Xmx4g
      xpack.security.enabled: false
      xpack.security.http.ssl.enabled: false
      node.name: node
      cluster.name: cluster
      http.cors.enabled: true
