# Local services for datapipe-ml tests (FiftyOne + cloud storage / MinIO).
#
#   cd libs/datapipe-ml
#   mkdir -p tests/.docker-data/minio
#   HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose --env-file tests/.env.test -f tests/docker-compose.yml up -d
#   docker compose -f tests/docker-compose.yml down
#
# Mongo keeps image defaults (cannot run as arbitrary host uid).
x-host-user: &host-user
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio:
    <<: *host-user
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    volumes:
      - type: bind
        source: ${DATAPIPE_DOCKER_DATA_DIR:-./.docker-data}/minio
        target: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-setup:
    <<: *host-user
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/datapipe-e2e &&
      echo 'bucket datapipe-e2e is ready'
      "
