[project]
name = "datapipe-e2e-example"
version = "0"
requires-python = ">=3.10,<3.13"
dependencies = [
    "datapipe-app[clickhouse,ml]",
    "datapipe-ui-ml",
    "datapipe-label-studio",
    "datapipe-ml[torch,fiftyone]",
    "torch==2.6.0", 
    "torchvision==0.21.0",
    "stringzilla==4.4.0",  # needed for albumentations
    "fiftyone==1.17.0",
]

# Legacy-host extras (e.g. epoch8 gpu5: pre-AVX2 CPU, old image stack). On modern machines run plain
# `uv sync` — do NOT edit dependencies (editing re-locks and drifts versions across machines).
[project.optional-dependencies]
ray = [
    "datapipe-core[ray]",
]
old-cpu = [
    "polars-lts-cpu==1.33.1",   # ultralytics/datapipe on pre-AVX2 CPUs (avoids SIGILL)
    "pi-heif",                  # ultralytics image verification imports it on this host
]

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu124" }
torchvision = { index = "pytorch-cu124" }
datapipe-label-studio = { path = "../../libs/datapipe-label-studio", editable = true }
datapipe-app = { path = "../../libs/datapipe-app", editable = true }
datapipe-app-ml-ops = { path = "../../libs/datapipe-app-ml-ops", editable = true }
datapipe-ui = { path = "../../libs/datapipe-ui", editable = true }
datapipe-ui-ml = { path = "../../libs/datapipe-ui-ml", editable = true }
datapipe-ml = { path = "../../libs/datapipe-ml", editable = true }
datapipe-core = { path = "../../libs/datapipe-core", editable = true }
cv-pipeliner = { git = "https://github.com/epoch8/cv-pipeliner", rev = "5724f8d54e4df64013fad85d41129799bc143293" }

[dependency-groups]
dev = [
    "pytest<8",
    "pytest-cases",
    "requests",
    "tqdm",
    "boto3",
]