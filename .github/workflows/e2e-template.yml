name: e2e-template

on:
  push:
    branches:
      - "master"
      - "v**"
    paths:
      - ".github/workflows/e2e-template.yml"
      - "examples/e2e_template/**"
      - "tests/e2e_template/**"
      - "libs/datapipe-core/**"
      - "libs/datapipe-label-studio/**"
      - "libs/datapipe-ml/**"
      - "pyproject.toml"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/e2e-template.yml"
      - "examples/e2e_template/**"
      - "tests/e2e_template/**"
      - "libs/datapipe-core/**"
      - "libs/datapipe-label-studio/**"
      - "libs/datapipe-ml/**"
      - "pyproject.toml"

jobs:
  test-e2e-template:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      minio:
        image: minio/minio:RELEASE.2024-07-16T23-46-41Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9000:9000
        command: server /data
    steps:
      - name: Run Label Studio
        run: |
          docker run -d \
            --add-host host.docker.internal:host-gateway \
            -p 8080:8080 \
            --env DJANGO_DB=default \
            --env POSTGRE_NAME=postgres \
            --env POSTGRE_USER=postgres \
            --env POSTGRE_PASSWORD=password \
            --env POSTGRE_PORT=5432 \
            --env POSTGRE_HOST=host.docker.internal \
            --env LABEL_STUDIO_ENABLE_LEGACY_API_TOKEN=true \
            heartexlabs/label-studio:1.22.0

      - name: Wait for Label Studio startup
        run: |
          for i in $(seq 1 90); do
            if curl -fsS "http://localhost:8080/user/login/" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Label Studio didn't become ready in time"
          exit 1

      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies with pip
        run: |
          python -m pip install --upgrade pip
          uv pip install --system -e "libs/datapipe-label-studio" -e "libs/datapipe-ml[torch,sqlite]" "boto3" "pytest<8" "pytest-cases" "fiftyone==1.4.0"

      - name: Get Label Studio API token
        id: label-studio-token
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datapipe_label_studio.sdk_utils import login_and_get_token, sign_up
          url = "http://localhost:8080"
          email = "test@epoch8.com"
          password = "qwerty123"
          token = sign_up(url, email, password) or login_and_get_token(url, email, password)
          print(f"token={token}")
          PY

      - name: Seed MinIO bucket
        run: |
          python - <<'PY'
          import boto3
          client = boto3.client(
              "s3",
              endpoint_url="http://localhost:9000",
              aws_access_key_id="minioadmin",
              aws_secret_access_key="minioadmin",
              region_name="us-east-1",
          )
          bucket = "datapipe-e2e"
          existing = [b["Name"] for b in client.list_buckets()["Buckets"]]
          if bucket not in existing:
              client.create_bucket(Bucket=bucket)
          PY

      - name: Create e2e Postgres schema
        run: |
          python - <<'PY'
          import os
          import sqlalchemy as sa

          schema = os.environ["DB_SCHEMA"]
          engine = sa.create_engine(os.environ["DB_URL"])
          with engine.begin() as conn:
              conn.execute(sa.text(f'DROP SCHEMA IF EXISTS "{schema}" CASCADE'))
              conn.execute(sa.text(f'CREATE SCHEMA "{schema}"'))
          PY
        env:
          DB_URL: postgresql://postgres:password@localhost:5432/postgres
          DB_SCHEMA: datapipe_e2e

      - name: Test e2e template with local services
        run: |
          python -m pytest tests/e2e_template -m "e2e_template"
        env:
          DB_URL: postgresql://postgres:password@localhost:5432/postgres
          DB_SCHEMA: datapipe_e2e
          LABEL_STUDIO_URL: http://localhost:8080
          LABEL_STUDIO_API_KEY: ${{ steps.label-studio-token.outputs.token }}
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
          S3_ENDPOINT_URL: http://localhost:9000
          S3_BUCKET: datapipe-e2e
          S3_PREFIX: images
